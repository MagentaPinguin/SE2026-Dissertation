<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#0f1115"></rect>

  <!-- GRID positions -->
  <!-- (16,16) (72,16) -->
  <!-- (16,72) (72,72) -->

  <!-- 🌱 Plants -->
  <g transform="translate(16,16)">
    <rect width="40" height="40" rx="8" fill="#1f2933"></rect>
    <path d="M20 26 C16 22, 14 18, 20 12 C26 18, 24 22, 20 26 Z" fill="#22c55e"></path>
    <rect x="18" y="26" width="4" height="6" fill="#16a34a"></rect>
  </g>

  <!-- ⚙️ Engineering -->
  <g transform="translate(72,16)">
    <rect width="40" height="40" rx="8" fill="#1f2933"></rect>
    <circle cx="20" cy="20" r="6" fill="none" stroke="#38bdf8" stroke-width="2"></circle>
    <g stroke="#38bdf8" stroke-width="2">
      <line x1="20" y1="6" x2="20" y2="12"></line>
      <line x1="20" y1="28" x2="20" y2="34"></line>
      <line x1="6" y1="20" x2="12" y2="20"></line>
      <line x1="28" y1="20" x2="34" y2="20"></line>
    </g>
  </g>

  <!-- 📊 Business -->
  <g transform="translate(16,72)">
    <rect width="40" height="40" rx="8" fill="#1f2933"></rect>
    <rect x="8" y="20" width="5" height="12" fill="#f59e0b"></rect>
    <rect x="17" y="14" width="5" height="18" fill="#fbbf24"></rect>
    <rect x="26" y="8" width="5" height="24" fill="#fde68a"></rect>
  </g>

  <!-- 🔌 IoT -->
  <g transform="translate(72,72)">
    <rect width="40" height="40" rx="8" fill="#1f2933"></rect>
    <rect x="12" y="12" width="16" height="16" rx="3" fill="#a855f7"></rect>
    <g stroke="#c084fc" stroke-width="2">
      <line x1="20" y1="4" x2="20" y2="12"></line>
      <line x1="20" y1="28" x2="20" y2="36"></line>
      <line x1="4" y1="20" x2="12" y2="20"></line>
      <line x1="28" y1="20" x2="36" y2="20"></line>
    </g>
  </g>

  <!-- center connection hint -->
  <g stroke="#6b7280" stroke-width="2" opacity="0.6">
    <line x1="56" y1="36" x2="72" y2="36"></line>
    <line x1="56" y1="92" x2="72" y2="92"></line>
    <line x1="36" y1="56" x2="36" y2="72"></line>
    <line x1="92" y1="56" x2="92" y2="72"></line>
